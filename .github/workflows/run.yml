name: Auto Run main.py

on:
  schedule:
    - cron: "0 21 * * *"     # 每天北京时间 5 点
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0   # 不依赖远程，但 checkout 必须完整

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install pipenv
      run: pip3 install --user pipenv

    - name: Install dependencies
      run: |
        pipenv --python 3.13
        pipenv install --deploy

    - name: Run main.py
      run: pipenv run python main.py

    - name: Commit and push (independent mode)
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"

        # 重新绑定远程（因为你已经断开了）
        git remote remove origin || true
        git remote add origin https://github.com/fogret/sourt.git

        # 完全独立运行：不 fetch、不 pull、不 reset
        git add .
        git commit -m "Auto update" || echo "No changes"

        # 强制覆盖远程，确保独立运行
        git push --force --set-upstream origin main
