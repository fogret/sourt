name: 'Update schedule'

on:
  schedule:
    - cron: "00 19 * * 0"
  workflow_dispatch:

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]

    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - uses: actions/checkout@v3
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Run with setup-python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update
        run: pipenv run dev

      - name: Copy m3u to Cloudflare Pages directory
        run: |
          mkdir -p public
          cp output/result.m3u public/result.m3u

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/ public/
          git reset -- .github/workflows/
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push --force
          fi

      # 同步到 fogret/soute
      - name: Checkout public repo fogret/soute
        uses: actions/checkout@v4
        with:
          repository: fogret/soute
          token: ${{ secrets.SOUTE_REPO_TOKEN }}
          path: public-repo

      - name: Copy result.m3u
        run: cp -f output/result.m3u public-repo/

      - name: Push to soute
        run: |
          cd public-repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add result.m3u
          git commit -m "Sync result.m3u" || true
          git push
