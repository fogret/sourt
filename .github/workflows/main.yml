name: 'Update schedule'

on:
  schedule:
    - cron: "0 18 * * 0"   # 每周一 北京时间 02:00 执行
  workflow_dispatch:

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]

    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITH_ENV

      - uses: actions/checkout@v3
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Run with setup-python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependecies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update
        run: pipenv run dev

      # ⭐⭐⭐ 只新增这一段：自动创建 public 并复制 m3u ⭐⭐⭐
      - name: Copy m3u to Cloudflare Pages directory
        run: |
          mkdir -p public
          cp output/result.m3u public/result.m3u

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated"
            git push --force
          fi

      # ===================== 以下为纯新增内容，无修改 =====================
      - name: Checkout fogret/soute
        uses: actions/checkout@v4
        with:
          repository: fogret/soute
          token: ${{ secrets.SOUTE_REPO_TOKEN }}
          path: public-repo

      - name: Copy result.m3u to soute
        run: cp -f output/result.m3u public-repo/

      # 只在这里加简单日志
      - name: Push to soute
        run: |
          cd public-repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          ls -lh result.m3u
          git diff result.m3u
          git add result.m3u
          git diff --quiet || git commit -m "Auto sync result.m3u"
          git push
