name: 'Update schedule'

on:
  schedule:
    - cron: "00 19 * * 0"
  workflow_dispatch:

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]

    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - uses: actions/checkout@v3
        with:
          ref: ${{ env.BRANCH_NAME }}

      # 清理缓存日志
      - name: Clean cache and log files
        run: |
          rm -rf output/log/
          rm -rf output/cache/
          rm -f output/log/unmatch.log
          rm -f *.log
          rm -f *.tmp

      - name: Run with setup-python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update
        run: pipenv run dev

      # 提交前再次清理
      - name: Clean again before commit
        run: |
          rm -rf output/log/
          rm -rf output/cache/
          rm -f output/log/unmatch.log
          rm -f *.log
          rm -f *.tmp

      - name: Copy m3u to Cloudflare Pages directory
        run: |
          mkdir -p public
          cp output/result.m3u public/result.m3u

      # ========== 修复段 关键修改 只看这里 ==========
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 只添加需要的目录，彻底排除 .github
          git add output/ public/
          # 强制还原 .github 所有文件，杜绝工作流变更
          git checkout -- .github/
          # 无改动直接跳过
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Github 行动自动更新"
            git push
          fi

      # 同步到 fogret/soute
      - name: Checkout public repo fogret/soute
        uses: actions/checkout@v4
        with:
          repository: fogret/soute
          token: ${{ secrets.SOUTE_REPO_TOKEN }}
          path: public-repo

      - name: Copy result.m3u
        run: cp -f output/result.m3u public-repo/

      - name: Push to soute
        run: |
          cd public-repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add result.m3u
          git commit -m "Sync result.m3u" || true
          git push
