name: Sync M3U to fogret/soute

on:
  push:
    branches:
      - master
    paths:
      - 'output/result.m3u'
  workflow_dispatch:  # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout public repo fogret/soute
        uses: actions/checkout@v4
        with:
          repository: fogret/soute
          token: ${{ secrets.SOUTE_REPO_TOKEN }}
          path: public-repo

      - name: Copy result.m3u
        run: cp -f output/result.m3u public-repo/

      - name: Push to soute
        run: |
          cd public-repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add result.m3u
          git commit -m "Sync result.m3u" || true
          git push
