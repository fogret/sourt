name: Sync M3U to fogret/soute

on:
  push:
    branches:
      - master  # 你的私有仓库主分支是master，这里不用改

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取私有仓库 fogret/sourt 代码
        uses: actions/checkout@v4

      - name: 拉取公开仓库 fogret/soute
        uses: actions/checkout@v4
        with:
          repository: fogret/soute
          token: ${{ secrets.SOUTE_REPO_TOKEN }}
          path: public-repo

      - name: 复制 result.m3u 到公开仓库
        run: |
          # 你的文件路径：fogret/sourt/master/output/result.m3u
          cp ./output/result.m3u ./public-repo/

      - name: 提交并推送到 fogret/soute
        run: |
          cd public-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto sync result.m3u from fogret/sourt" || echo "No changes to commit"
          git push
