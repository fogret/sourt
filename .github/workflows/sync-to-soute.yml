name: Sync M3U to fogret/soute

on:
  push:
    branches:
      - master
    paths:
      - 'output/result.m3u'
  workflow_dispatch:  # 👈 这里就是手动触发开关

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout public repo fogret/soute
        uses: actions/checkout@v4
        with:
          repository: fogret/soute
          token: ${{ secrets.SOUTE_REPO_TOKEN }}
          path: public-repo
          fetch-depth: 1

      - name: Copy result.m3u to public repo
        run: |
          cp -f output/result.m3u public-repo/

      - name: Commit and push to soute
        run: |
          cd public-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.m3u
          git diff --staged --quiet || git commit -m "Auto sync result.m3u from fogret/sourt"
          git push
